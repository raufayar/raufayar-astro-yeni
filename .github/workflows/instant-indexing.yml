name: raufayar.net Anlık İndeksleme Motoru (GEO & SEO 2026)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  instant-index:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu GitHub'dan Çek
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Bağımlılıkları ve Çekirdek Kütüphaneyi Kur
        run: npm install google-indexing-script

      - name: BING ve YANDEX İçin IndexNow Protokolünü Ateşle
        uses: marketplace/actions/indexnow-action@v3
        with:
          sitemap-location: 'https://raufayar.net'
          key: ${{ secrets.INDEXNOW_KEY }}
          key-location: 'https://raufayar.net{{ secrets.INDEXNOW_KEY }}.txt'

      - name: GOOGLE INDEXING API Motorunu Çalıştır
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json
          node indexer.js
