name: Live GEO Citation Dataset Updater

on:
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00'da çalışır
  workflow_dispatch: # İstediğimiz zaman elle başlatabilmek için düğme ekler

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run GEO Tracker Script
      env:
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      run: python update_geo_data.py

    - name: Commit and Push if Changes Exist
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add .
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-updated LLM citation weights"
        git push
