      - name: Send IndexNow Ping - Latest Post

        if: success()

        run: |

          echo "🚀 IndexNow Ping - En son yazı gönderiliyor..."



          SITE_URL="https://raufayar.net"

          
          # RSS'ten en son yazının linkini al (en güvenilir yöntem)

          LATEST_POST=$(curl -s "$SITE_URL/rss.xml" | \

                        grep -oP '<link>https?://[^<]+' | \

                        head -n 1 | \

                        sed 's/<link>//')



          if [[ -z "$LATEST_POST" || "$LATEST_POST" == "https://raufayar.net/" ]]; then

            echo "⚠️ RSS'ten link alınamadı, ana sayfa kullanılıyor."

            LATEST_POST="$SITE_URL"

          fi



          echo "📄 En son yazı: $LATEST_POST"



          # Bing IndexNow

          curl -s "https://www.bing.com/indexnow?url=$LATEST_POST&key=raufnow12345" && \

            echo "✅ Bing'e gönderildi" || echo "❌ Bing hatası"


          # Yandex IndexNow

          curl -s "https://yandex.com/indexnow?url=$LATEST_POST&key=raufnow12345" && \

            echo "✅ Yandex'e gönderildi" || echo "❌ Yandex hatası"

          # Ekstra olarak ana sayfa ve RSS de pinglensin

          curl -s "https://www.bing.com/indexnow?url=$SITE_URL&key=raufnow12345" > /dev/null

          curl -s "https://www.bing.com/indexnow?url=$SITE_URL/rss.xml&key=raufnow12345" > /dev/null



          echo "🎯 IndexNow işlemleri tamamlandı. En son yazı pinglendi." 

