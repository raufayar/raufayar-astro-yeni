name: Deploy to GitHub Pages + Ultra SEO & IndexNow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  deployments: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Astro Site
        uses: withastro/action@v5
        with:
          path: .
          node-version: 22
          package-manager: pnpm

      - name: 📊 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-build
          path: dist
          retention-days: 7

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Download Build
        uses: actions/download-artifact@v4
        with:
          name: astro-build
          path: dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🔄 IndexNow Ultra Ping (raufnow12345)
        env:
          SITE_URL: "https://raufayar.net"
          INDEXNOW_KEY: "raufnow12345"
        run: |
          echo "🚀 IndexNow Ultra Ping Başlıyor..."

          # En son yazıyı RSS'ten al
          LATEST_POST=$(curl -s "$SITE_URL/rss.xml" | \
            grep -oP '<link>https?://[^<]+' | head -n 1 | sed 's/<link>//' || echo "$SITE_URL")

          echo "📄 En son yazı: $LATEST_POST"

          # === IndexNow Ping'leri ===
          # Bing
          curl -s "https://www.bing.com/indexnow?url=$LATEST_POST&key=$INDEXNOW_KEY" && \
            echo "✅ Bing → En son yazı gönderildi" || echo "❌ Bing hatası"

          # Yandex
          curl -s "https://yandex.com/indexnow?url=$LATEST_POST&key=$INDEXNOW_KEY" && \
            echo "✅ Yandex → En son yazı gönderildi" || echo "❌ Yandex hatası"

          # IndexNow.org (Global)
          curl -s "https://api.indexnow.org/indexnow?url=$LATEST_POST&key=$INDEXNOW_KEY" && \
            echo "✅ IndexNow.org → Gönderildi" || echo "❌ IndexNow.org hatası"

          # Google Sitemap Ping
          curl -s "https://www.google.com/ping?sitemap=$SITE_URL/sitemap-index.xml" && \
            echo "✅ Google sitemap ping gönderildi"

          # Ekstra önemli sayfalar
          echo "🔄 Ana sayfa ve RSS pingleniyor..."
          curl -s "https://www.bing.com/indexnow?url=$SITE_URL&key=$INDEXNOW_KEY" > /dev/null
          curl -s "https://www.bing.com/indexnow?url=$SITE_URL/rss.xml&key=$INDEXNOW_KEY" > /dev/null
          curl -s "https://www.bing.com/indexnow?url=$SITE_URL/sitemap-index.xml&key=$INDEXNOW_KEY" > /dev/null

          echo "🎯 Tüm IndexNow işlemleri tamamlandı!"

      - name: 📢 Discord Bildirimi (İsteğe Bağlı)
        if: always()
        uses: Ilshidur/action-discord@master
        with:
          discord_webhook: ${{ secrets.DISCORD_WEBHOOK }}
          message: |
            **🚀 Deployment Tamamlandı**
            Site: https://raufayar.net
            Commit: ${{ github.sha }}
            Durum: ${{ job.status }}
