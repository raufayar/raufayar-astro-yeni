name: Deploy to GitHub Pages

on:
  # Ana branch'e push yapıldığında deploy et
  push:
    branches: [ main, master ]
  # Manuel olarak workflow tetikleyebilmek için
  workflow_dispatch:

# İzin ayarları
permissions:
  contents: read
  pages: write
  id-token: write

# Tek seferde sadece bir deploy çalışsın
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
