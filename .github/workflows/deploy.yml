- name: Send Indexing Pings (Google, Bing, Yandex)
        if: success()
        run: |
          echo "🚀 Quantum Indexing Sync Started..."
          
          # Degiskenler
          SITE_URL="https://www.raufayar.net"
          KEY="raufnow12345"
          
          # RSS'ten son yaziyi al
          LATEST_POST=$(curl -s "$SITE_URL/rss.xml" | grep -oP '<link>https?://[^<]+' | head -n 1 | sed 's/<link>//')
          if [[ -z "$LATEST_POST" ]]; then LATEST_POST="$SITE_URL"; fi
          echo "📄 Hedeflenen URL: $LATEST_POST"

          # 1. BING & YANDEX (IndexNow - Push Yontemi)
          curl -s "https://www.bing.com/indexnow?url=$LATEST_POST&key=$KEY"
          curl -s "https://yandex.com/indexnow?url=$LATEST_POST&key=$KEY"
          
          # 2. GOOGLE (Sitemap Ping - Zorunlu)
          # Hata vermemesi icin ciktiyi null'a yonlendiriyoruz ve komut basarisiz olsa bile devam ettiriyoruz
          curl -s -o /dev/null -w "%{http_code}" "https://www.google.com/ping?sitemap=$SITE_URL/sitemap-index.xml" || true
          
          echo "✅ Indexing Sync Tamamlandi."


