name: 🚀 Deploy to GitHub Pages + Ultra SEO & IndexNow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Astro
        run: pnpm run build

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          retention-days: 7

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🔄 IndexNow Ultra Ping
        env:
          SITE_URL: "https://raufayar.net"
          INDEXNOW_KEY: "raufnow12345"
        run: |
          echo "🚀 IndexNow Ping Başlıyor..."

          LATEST_POST=$(curl -s "$SITE_URL/rss.xml" | grep -oP '<link>https?://[^<]+' | head -n 1 | sed 's/<link>//' || echo "$SITE_URL")
          echo "📄 En son yazı: $LATEST_POST"

          curl -s "https://www.bing.com/indexnow?url=$LATEST_POST&key=$INDEXNOW_KEY" && echo "✅ Bing OK" || echo "❌ Bing Error"
          curl -s "https://yandex.com/indexnow?url=$LATEST_POST&key=$INDEXNOW_KEY" && echo "✅ Yandex OK" || echo "❌ Yandex Error"
          curl -s "https://api.indexnow.org/indexnow?url=$LATEST_POST&key=$INDEXNOW_KEY" && echo "✅ IndexNow.org OK" || echo "❌ IndexNow.org Error"

          curl -s "https://www.google.com/ping?sitemap=$SITE_URL/sitemap-index.xml" && echo "✅ Google OK"

          echo "🎯 Tüm ping'ler tamamlandı!"
