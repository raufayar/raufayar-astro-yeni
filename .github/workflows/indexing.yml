name: Google Indexing Force
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Indexing
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: |
          # 1. JSON dosyasını oluştur
          echo "$GOOGLE_JSON" > sa.json
          
          # 2. Token alma işlemini basit bir şekilde yap (API çağrısı)
          # Servis hesabı JSON'undan token üretmek için doğrudan REST API kullanıyoruz
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$(python3 -c '
import jwt, time, json
with open("sa.json") as f: sa = json.load(f)
now = int(time.time())
payload = {
    "iss": sa["client_email"],
    "scope": "https://www.googleapis.com/auth/indexing",
    "aud": "https://oauth2.googleapis.com/token",
    "iat": now,
    "exp": now + 3600
}
print(jwt.encode(payload, sa["private_key"], algorithm="RS256"))
')" | jq -r .access_token)

          # 3. Son yazıyı al
          SITE_URL="https://www.raufayar.net"
          LATEST_POST=$(curl -s "$SITE_URL/rss.xml" | grep -oP '<link>https?://[^<]+' | head -n 1 | sed 's/<link>//')
          if [[ -z "$LATEST_POST" ]]; then LATEST_POST="$SITE_URL"; fi

          # 4. Google'a gönder
          curl -i -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -d "{ \"url\": \"$LATEST_POST\", \"type\": \"URL_UPDATED\" }" \
            "https://indexing.googleapis.com/v3/urlNotifications:publish"
