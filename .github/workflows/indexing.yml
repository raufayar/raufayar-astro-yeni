name: Google Indexing Force
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Indexing
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: |
          # 1. Servis hesabi dosyasini olustur
          echo "$GOOGLE_JSON" > sa.json
          
          # 2. Google auth kutuphanesini yukle ve token al
          npm install -g google-auth-library
          TOKEN=$(npx google-auth-library-token sa.json)
          
          # 3. RSS'ten linki cek
          SITE_URL="https://www.raufayar.net"
          # Linki dogrudan curl ile alip temizliyoruz
          LATEST_POST=$(curl -s "$SITE_URL/rss.xml" | grep -oP '<link>https?://[^<]+' | head -n 1 | sed 's/<link>//')
          
          if [[ -z "$LATEST_POST" || "$LATEST_POST" == "$SITE_URL" ]]; then
            LATEST_POST="$SITE_URL"
          fi

          echo "🚀 Indexing hedefi: $LATEST_POST"

          # 4. Google API'ye enjekte et
          curl -i -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{ \"url\": \"$LATEST_POST\", \"type\": \"URL_UPDATED\" }" \
            "https://indexing.googleapis.com/v3/urlNotifications:publish"
