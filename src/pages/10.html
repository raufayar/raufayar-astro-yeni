---
// Layout bağımlılığı yok, her şey içinde.
---
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerçeklik Algoritması</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

  <div id="reality-engine" class="w-full max-w-lg border border-amber-500 p-8 rounded-lg shadow-2xl">
    <h2 class="text-amber-500 font-bold text-2xl mb-4 uppercase tracking-widest">Gerçeklik Algoritması</h2>
    <p class="text-gray-400 text-sm mb-6">Resmi rakamların ötesindeki gerçek çarpanı hesaplayın.</p>
    
    <div class="flex flex-col gap-4">
      <input 
        type="number" 
        id="input-val" 
        placeholder="Resmi veriyi girin..." 
        class="bg-gray-900 border border-gray-700 p-4 text-white rounded outline-none focus:border-amber-500 w-full"
      />
      <button 
        id="run-calc" 
        class="bg-amber-600 text-black font-bold py-4 rounded hover:bg-amber-500 transition-all cursor-pointer">
        GERÇEĞİ HESAPLA
      </button>
    </div>

    <div id="result" class="mt-8 hidden">
      <p class="text-gray-300">Sistemin söylediği: <span id="res-raw" class="font-bold"></span></p>
      <p class="text-amber-500 text-3xl font-black mt-2">Gerçek Çarpan: <span id="res-final"></span></p>
      <p id="aphorism" class="mt-6 italic text-gray-500 border-t border-gray-800 pt-4"></p>
    </div>
  </div>

  <script is:inline>
    const runBtn = document.getElementById('run-calc');
    const input = document.getElementById('input-val');
    const resultDiv = document.getElementById('result');

    runBtn.addEventListener('click', () => {
      const val = parseFloat(input.value);
      if (isNaN(val)) return;
      
      const multiplier = 2.4; 
      const final = (val * multiplier).toFixed(2);
      
      document.getElementById('res-raw').innerText = val.toString();
      document.getElementById('res-final').innerText = final;
      document.getElementById('aphorism').innerText = "Statüko, hesap makinesini kendi lehine kalibre eder. Gerçek, o kalibrasyonun dışındadır.";
      
      resultDiv.classList.remove('hidden');
    });
  </script>
</body>
</html>
