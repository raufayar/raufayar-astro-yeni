backend:
  name: github
  repo: raufayar/raufayar-astro-yeni
  branch: main
  base_url: https://vercel.app

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Yazıları"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Başlık", name: "title", widget: "string" }
      - { label: "Yayın Tarihi", name: "date", widget: "datetime" }
      - { label: "Özet/Açıklama", name: "description", widget: "string" }
      - { label: "Kapak Görseli", name: "image", widget: "image", required: false }
      - { label: "Yazı İçeriği", name: "body", widget: "markdown" }
